<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MapToPoster</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="home-body">
    <main class="home-shell">
      <section class="home-hero">
        <div class="home-copy">
          <div class="home-brand">
            <span class="brand-mark">M</span>
            <span>MapToPoster</span>
          </div>
          <h1>Turn cities into printable posters.</h1>
          <p>
            Choose a city, preview the real output, switch themes, and download
            the poster as PDF, PNG, or SVG.
          </p>
          <div class="home-actions">
            <a class="home-cta" href="/studio">Open studio</a>
            <a class="home-cta secondary" href="/about.html">What is MapToPoster?</a>
          </div>
        </div>

        <div class="home-gallery" aria-label="Generated posters">
          <div class="gallery-column" id="gallery-a"></div>
          <div class="gallery-column slow" id="gallery-b"></div>
          <div class="gallery-column" id="gallery-c"></div>
        </div>
      </section>
    </main>

    <script src="/home.js"></script>
  </body>
</html>
