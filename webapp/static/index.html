      <section class="home-hero">
        <div class="home-copy">
          <div class="home-brand">
            <span class="brand-mark">M</span>

          </div>

          <div class="home-actions">
            <a class="home-cta" href="/studio">Apri lo studio</a>
            <a class="home-cta secondary" href="/about.html">Cos'è MapToPoster</a>

          <div class="gallery-column" id="gallery-a"></div>
          <div class="gallery-column slow" id="gallery-b"></div>
          <div class="gallery-column" id="gallery-c"></div>

    <script src="/home.js"></script>
