<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MapToPoster Studio</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="tooltip-popover" id="tooltip-popover" role="tooltip" hidden></div>
    <main class="app-shell">
      <section class="studio">
        <div class="panel controls">
          <div class="brand">
            <span class="brand-mark">M</span>
            <div>
              <h1>MapToPoster Studio</h1>
              <p>Local urban poster generator</p>
            </div>
          </div>

          <form id="poster-form">
            <div class="field-grid two">
              <label>
                <span class="field-label">City <button type="button" class="help-tip" data-tooltip="Name used to locate the city on OpenStreetMap and name the generated file.">?</button></span>
                <input name="city" value="New York" autocomplete="address-level2" required>
              </label>
              <label>
                <span class="field-label">Country <button type="button" class="help-tip" data-tooltip="Helps geocoding find the right city, especially when multiple places share the same name.">?</button></span>
                <input name="country" value="USA" autocomplete="country-name" required>
              </label>
            </div>

            <div class="field-grid two">
              <label>
                <span class="field-label">Poster city <button type="button" class="help-tip" data-tooltip="Overrides the city name printed on the poster without changing the searched location.">?</button></span>
                <input name="displayCity" placeholder="optional">
              </label>
              <label>
                <span class="field-label">Poster country <button type="button" class="help-tip" data-tooltip="Overrides the country text shown on the poster. Useful for translations or custom names.">?</button></span>
                <input name="displayCountry" placeholder="optional">
              </label>
            </div>

            <label>
              <span class="field-label">Alternative country label <button type="button" class="help-tip" data-tooltip="Fallback country text for the poster when Poster country is empty.">?</button></span>
              <input name="countryLabel" placeholder="optional">
            </label>

            <div class="field-grid two">
              <label>
                <span class="field-label">Latitude <button type="button" class="help-tip" data-tooltip="Manual map center. Fill it together with longitude to skip automatic search.">?</button></span>
                <input name="latitude" inputmode="decimal" placeholder="optional">
              </label>
              <label>
                <span class="field-label">Longitude <button type="button" class="help-tip" data-tooltip="Manual map center. Fill it together with latitude.">?</button></span>
                <input name="longitude" inputmode="decimal" placeholder="optional">
              </label>
            </div>

            <div class="slider-row">
              <label>
                <span class="field-label">Distance <strong id="distance-value">18000 m</strong> <button type="button" class="help-tip" data-tooltip="Map radius in meters: smaller values focus on the center, larger values include more neighborhoods.">?</button></span>
                <input type="range" name="distance" min="1000" max="50000" step="500" value="18000">
              </label>
              <button type="button" class="inline-action" id="reset-distance">Reset distance</button>
            </div>

            <div class="field-grid two">
              <label>
                <span class="field-label">Width <button type="button" class="help-tip" data-tooltip="Physical poster width in inches. Affects proportions and final resolution.">?</button></span>
                <input name="width" type="number" min="1" max="50" step="0.1" value="12">
              </label>
              <label>
                <span class="field-label">Height <button type="button" class="help-tip" data-tooltip="Physical poster height in inches. Use values that match the print format you want.">?</button></span>
                <input name="height" type="number" min="1" max="50" step="0.1" value="16">
              </label>
            </div>

            <div class="size-picker" aria-label="Paper size">
              <span class="field-label">Paper size <button type="button" class="help-tip" data-tooltip="Automatically sets width and height in inches for vertical ISO formats. PDF is recommended for A0 and A1.">?</button></span>
              <div class="size-options">
                <button type="button" class="size-option" data-width="33.1" data-height="46.8">A0</button>
                <button type="button" class="size-option" data-width="23.4" data-height="33.1">A1</button>
                <button type="button" class="size-option" data-width="11.7" data-height="16.5">A3</button>
                <button type="button" class="size-option" data-width="8.3" data-height="11.7">A4</button>
              </div>
            </div>

            <input type="hidden" name="format" value="pdf">
            <div class="format-picker" role="radiogroup" aria-label="Output format">
              <span class="field-label">Format <button type="button" class="help-tip" data-tooltip="Choose the file type to download. Recommended: PDF for better print quality and sharper output.">?</button></span>
              <div class="format-options">
                <button type="button" class="format-option" data-format="png" aria-pressed="false">PNG</button>
                <button type="button" class="format-option selected" data-format="pdf" aria-pressed="true">PDF</button>
                <button type="button" class="format-option" data-format="svg" aria-pressed="false">SVG</button>
              </div>
            </div>

            <label>
              <span class="field-label">Google Font <button type="button" class="help-tip" data-tooltip="Name of a Google Fonts family to use for text, for example Noto Sans JP or Cairo.">?</button></span>
              <input name="fontFamily" placeholder="Noto Sans JP, Cairo, Open Sans">
            </label>

            <div class="theme-header">
              <span class="field-label">Theme <button type="button" class="help-tip" data-tooltip="Graphic palette for the poster. Clicking a theme generates a real preview on the right.">?</button></span>
              <label class="toggle">
                <input type="checkbox" name="allThemes">
                <span class="field-label">All themes <button type="button" class="help-tip" data-tooltip="When enabled, the final generation creates every theme and prepares a ZIP. The main preview still shows one selected theme.">?</button></span>
              </label>
            </div>
            <div id="theme-grid" class="theme-grid"></div>
          </form>
        </div>

        <div class="preview-area">
          <section class="poster-stage" aria-live="polite">
            <div class="poster-preview" id="poster-preview">
              <div class="map-lines"></div>
              <div class="poster-copy">
                <span id="preview-city">N E W   Y O R K</span>
                <i></i>
                <small id="preview-country">USA</small>
              </div>
            </div>
            <div class="preview-loading" id="preview-loading" hidden>
              <span></span>
              <strong>Generating the image</strong>
              <small>The preview will appear here when ready.</small>
            </div>
          </section>

          <section class="panel results">
            <div>
              <h2>Output</h2>
              <p id="status">Ready</p>
            </div>
            <div id="download-area" class="download-area"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
